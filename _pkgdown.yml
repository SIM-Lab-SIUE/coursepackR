url: https://sim-lab-siue.github.io/coursepackR/
template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#0072B2"
    secondary: "#007A6D"
    success: "#2E7D32"
    info: "#0072B2"
    warning: "#946800"
    danger: "#880E4F"
    bg: "#FFFFFF"
    fg: "#1a1a2e"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "Source Code Pro"}
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

home:
  title: coursepackR - Course Tools for From Vibes to Variables
  description: >
    Student-facing R package for MC-451 Research Methods at SIUE.
    Download weekly materials, access the music dataset, and manage
    your research project.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    reference:
      text: Function Reference
      href: reference/index.html
    articles:
      text: Guides
      menu:
        - text: Installation & Setup
          href: articles/installation.html
        - text: Getting Started
          href: articles/getting-started.html
        - text: The Unified Music Dataset
          href: articles/unified-music-codebook.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/SIM-Lab-SIUE/coursepackR

reference:
  - title: "Setup & Diagnostics"
    desc: "Configure your environment and verify everything works"
    contents:
      - mccourse_setup
      - mccourse_check
      - mccourse_update

  - title: "Course Materials"
    desc: "Download and access weekly templates and scaffolds"
    contents:
      - download_week
      - download_journal
      - open_week
      - final_project

  - title: "Course Listings"
    desc: "See what courses and weeks are available"
    contents:
      - list_courses
      - list_weeks

  - title: "Data"
    desc: "Bundled datasets"
    contents:
      - unified_music

articles:
  - title: Guides
    navbar: ~
    contents:
      - installation
      - getting-started
      - unified-music-codebook
